<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="loading.css">
    <link rel="preload" href="assets/icon/wired-lineal-1927-food-truck-hover-pinch.gif" as="image">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan&family=Baloo+Bhaijaan+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Baloo Bhaijaan 2', sans-serif;
        }
 
        @media (max-width: 767px) {
            body {
                overflow-y: auto;
                min-height: 100svh;
            }
        }

        @media (min-width: 768px) {
            body {
                overflow: hidden;
                height: 100vh;
            }
        }
    </style>
</head>

<body class="bg-[#FEBB19]">

    <!-- Navbar Header -->
    <header class="w-full sticky top-0 z-50 bg-white md:bg-transparent md:fixed">
        <div class="mx-auto px-4 sm:px-6 lg:px-8 py-3 flex justify-between items-center">
            <a href="#">
                <img class="h-12 w-12 rounded-full" src="assets/icon/Logo_Burgerlicious_square.png" alt="Logo Burgerlicious">
            </a>

            <nav class="hidden md:flex bg-white rounded-full">
                <a class="text-black hover:text-white hover:bg-[#8F0919] px-9 py-2.5 rounded-full transition-colors" href="index.html">Home</a>
                <a class="text-black hover:text-white hover:bg-[#8F0919] px-9 py-2.5 rounded-full transition-colors" href="#menu">Menu</a>
                <a class="text-black hover:text-white hover:bg-[#8F0919] px-9 py-2.5 rounded-full transition-colors" href="#promo">Promo</a>
                <a class="text-black hover:text-white hover:bg-[#8F0919] px-9 py-2.5 rounded-full transition-colors" href="#about">About</a>
            </nav>

            <a class=" bg-white text-black hover:bg-[#8F0919] hover:text-white hover:shadow-2xl py-2.5 px-6 rounded-full transition-all duration-300 text-sm md:text-base" href="login.html">Login</a>
        </div>
    </header>


    <!-- MOBILE -->
    <div class="md:hidden flex flex-col items-center px-5 py-10">
        <!-- Login  -->
        <div class="relative bg-white w-full max-w-sm rounded-2xl shadow-lg mt-10 pb-8">
            <!-- Logo-->
            <div class="absolute -top-10 left-1/2 -translate-x-1/2">
                <div class="w-20 h-20 bg-yellow-500 rounded-full border-[6px] border-white drop-shadow-[0_-4px_6px_rgba(0,0,0,0.2)] flex items-center justify-center overflow-hidden">
                    <img src="assets/icon/Logo_Burgerlicious_square.png" class="w-16 h-16 object-contain">
                </div>
            </div>

            <p class="text-2xl text-center mt-14" style="font-family: 'Baloo Bhaijaan', sans-serif;">Login</p>

            <div class="mt-4 px-7 flex flex-col gap-4">
                <!-- Form Message -->
                <div id="formMessage" class="hidden text-sm text-center px-4 py-2 rounded-lg"></div>

                <!-- Email -->
                <div class="flex flex-col gap-1.5">
                    <label class="text-sm text-gray-700">Email</label>
                    <input id="email" type="email" placeholder="Masukkan email"
                        class="text-sm px-4 py-3 rounded-md border border-[#5D0303] focus:outline-none focus:ring-2 focus:ring-[#5D0303] focus:border-yellow-400 transition duration-200">
                    <span id="emailError" class="hidden text-xs text-red-600"></span>
                </div>

                <!-- Password -->
                <div class="flex flex-col gap-1.5">
                    <label class="text-sm text-gray-700">Password</label>
                    <input type="password" id="password" placeholder="Masukkan password"
                        class="text-sm px-4 py-3 rounded-md border border-[#5D0303] focus:outline-none focus:ring-2 focus:ring-[#5D0303] focus:border-yellow-400 transition duration-200">
                    <span id="passwordError" class="hidden text-xs text-red-600"></span>
                    <label class="inline-flex items-center gap-2 mt-1 text-gray-700 text-sm cursor-pointer"><input type="checkbox" id="showPassword" class="w-4 h-4 border border-gray-400 rounded focus:ring-2 focus:ring-[#5D0303]">Show Password</label>
                </div>

                <!-- Submit -->
                <button id="btnLogin" type="button" class="mx-auto w-[120px] mt-2 bg-[#5D0303] text-white py-2.5 rounded-xl shadow-md hover:bg-[#8F0919] transition duration-200 font-semibold tracking-wide disabled:opacity-60">SIGN IN</button>

                <div class="flex flex-col gap-1 mt-1">
                    <p class="text-xs text-center">Forgot <span class="text-[#8F0919] cursor-pointer hover:underline">Username / Password?</span></p>
                    <p class="text-xs text-center">Don't have an account? <a href="register.html" class="text-[#8F0919] hover:underline">Sign up</a></p>
                </div>
            </div>
        </div>
    </div>


    <!-- Website -->
    <div class="hidden md:flex h-screen">
        <!-- Foto kiri -->
        <div class="flex flex-col w-[600px] flex-shrink-0 h-screen">
            <img src="assets/images/makan_burger.jpg" class="w-full h-1/3 object-cover">
            <img src="assets/images/burger_kentang.jpg" class="w-full h-1/3 object-cover">
            <img src="assets/images/minum_kopi.jpg" class="w-full h-1/3 object-cover">
        </div>

        <!-- Login -->
        <div class="flex-1 flex items-center justify-center mt-15">
            <div class="relative bg-white w-[440px] h-[540px] rounded-xl shadow-md">
                <p class="text-2xl text-center mt-25" style="font-family: 'Baloo Bhaijaan', sans-serif;">Login</p>
                <div class="absolute -top-9 left-1/2 -translate-x-1/2">
                    <div class="w-20 h-20 bg-yellow-500 rounded-full border-10 border-white drop-shadow-[0_-6px_6px_rgba(0,0,0,0.2)] flex items-center justify-center overflow-hidden">
                        <img src="assets/icon/Logo_Burgerlicious_square.png" class="w-16 h-16 object-contain">
                    </div>
                </div>
                <div class="mt-5 px-10 flex flex-col gap-5">
                    <!-- Form Message -->
                    <div id="formMessage" class="hidden text-sm text-center px-4 py-2 rounded-lg"></div>

                    <!-- Email -->
                    <div class="flex flex-col gap-2">
                        <label class="text-sm text-gray-700">Email</label>
                        <input id="email" type="email" placeholder="Masukkan email"
                            class="text-sm px-4 py-3 rounded-sm border border-[#5D0303] focus:outline-none focus:ring-2 focus:ring-[#5D0303] focus:border-yellow-400 transition duration-200">
                        <span id="emailError" class="hidden text-xs text-red-600"></span>
                    </div>
                    <!-- Password -->
                    <div class="flex flex-col gap-2">
                        <label class="text-sm text-gray-700">Password</label>
                        <input type="password" id="password" placeholder="Masukkan password"
                            class="text-sm px-4 py-3 rounded-sm border border-[#5D0303] focus:outline-none focus:ring-2 focus:ring-[#5D0303] focus:border-yellow-400 transition duration-200">
                        <span id="passwordError" class="hidden text-xs text-red-600"></span>
                        <label class="inline-flex items-center gap-2 mt-2 text-gray-700 text-sm cursor-pointer">
                            <input type="checkbox" id="showPassword"
                                class="w-4 h-4 border border-gray-400 rounded focus:ring-2 focus:ring-[#5D0303]">
                            Show Password
                        </label>
                    </div>
                    <!-- Submit -->
                    <button id="btnLogin" type="button"
                        class="mx-auto w-[100px] mt-2 bg-[#5D0303] text-white py-2 rounded-lg shadow-md hover:bg-[#8F0919] transition duration-200 disabled:opacity-60">
                        SIGN IN
                    </button>
                    <div class="flex flex-col gap-1 mt-2">
                        <p class="text-xs text-center">Forgot <span class="text-[#8F0919] cursor-pointer hover:underline">Username / Password?</span></p>
                        <p class="text-xs text-center">Don't have an account? <a href="register.html" class="text-[#8F0919] hover:underline ml-1">Sign up</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="loading.js"></script>
    <script src="login.js"></script>
