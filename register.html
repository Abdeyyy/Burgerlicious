<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=\, initial-scale=1.0">
    <title>Register</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan&family=Baloo+Bhaijaan+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body class="bg-[#FEBB19] h-screen overflow-hidden flex" style="font-family: 'Baloo Bhaijaan 2', sans-serif;">
    <!-- Navbar Header -->
    <header class="w-screen sticky bg-white md:fixed md:bg-transparent sm:bg-transparent z-50">
        <div class="mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <a href="#" class="">
                <img class="h-15 w-15 rounded-full" src="assets/icon/Logo_Burgerlicious_square.png" alt="Logo Burgerlicious">
            </a>
            <nav class="hidden md:flex bg-white rounded-full">
                <a class="text-black hover:text-white hover:bg-[#8F0919] px-9 py-2.5 rounded-full transition-colors" href="index.html">Home</a>
                <a class="text-black hover:text-white hover:bg-[#8F0919] px-9 py-2.5 rounded-full transition-colors" href="#menu">Menu</a>
                <a class="text-black hover:text-white hover:bg-[#8F0919] px-9 py-2.5 rounded-full transition-colors" href="#promo">Promo</a>
                <a class="text-black hover:text-white hover:bg-[#8F0919] px-9 py-2.5 rounded-full transition-colors" href="#about">About</a>
            </nav>
        
            <a class="text-black font-bold bg-[#FFAD5B] hover:shadow-2xl hover:brightness-125 py-3 px-7 rounded-full transition-all" href="login.html">Login</a>
        </div>
    </header>
    

    <!-- Kotak regist -->
    <div class="flex-1 flex items-center justify-center mt-15">
        <!-- Logo -->
        <div class="relative bg-white w-[440px] h-[540px] rounded-xl shadow-md">
            <p class="text-2xl text-center mt-15" style="font-family: 'Baloo Bhaijaan', sans-serif;">Sign Up</p>
            <div class="absolute -top-9 left-1/2 -translate-x-1/2">
                <div class="w-20 h-20 bg-yellow-500 rounded-full border-10 border-white drop-shadow-[0_-6px_6px_rgba(0,0,0,0.2)] flex items-center justify-center overflow-hidden">
                    <img src="assets/icon/Logo_Burgerlicious_square.png" class="w-16 h-16 object-contain">
                </div>
            </div>
            <form class="mt-5 px-10 flex flex-col gap-5">
                <!-- FOrm email -->
                <div class="flex flex-col gap-2 -mt-5">
                    <label class="text-sm text-gray-700">Nama Lengkap</label>
                    <input type="email" placeholder="Masukkan nama lengkap" class="text-sm px-4 py-3 rounded-sm border border-[#5D0303] focus:outline-none focus:ring-2 focus:ring-[#5D0303] focus:border-yellow-400 transition duration-200">
                </div>
                <div class="flex flex-col gap-2 -mt-4">
                    <label class="text-sm text-gray-700">Email</label>
                    <input type="email" placeholder="Masukkan email" class="text-sm px-4 py-3 rounded-sm border border-[#5D0303] focus:outline-none focus:ring-2 focus:ring-[#5D0303] focus:border-yellow-400 transition duration-200">
                </div>
                <!-- Form pass + show pass -->
                <div class="flex flex-col gap-2 -mt-4">
                    <label class="text-sm text-gray-700">Password</label>
                    <input type="password" placeholder="Masukkan password" class="text-sm px-4 py-3 rounded-sm border border-[#5D0303] focus:outline-none focus:ring-2 focus:ring-[#5D0303] focus:border-yellow-400 transition duration-200">
                    <label class="inline-flex items-center gap-2 mt-2 text-gray-700 text-sm cursor-pointer">
                </div>
                <div class="flex flex-col gap-2 -mt-7">
                    <label class="text-sm text-gray-700">Confirm Password</label>
                    <input type="password" placeholder="Masukkan password" class="text-sm px-4 py-3 rounded-sm border border-[#5D0303] focus:outline-none focus:ring-2 focus:ring-[#5D0303] focus:border-yellow-400 transition duration-200">
                    <label class="inline-flex items-center gap-2 mt-2 text-gray-700 text-sm cursor-pointer">
                    <input type="checkbox" id="showPassword" class="w-4 h-4 border border-gray-400 rounded focus:ring-2 focus:ring-[#5D0303]">Show Password</label>
                </div>
                <!-- Tombol sign in -->
                <button type="submit" class="mx-auto w-[100px] -mt-1 bg-[#5D0303] text-white py-2 rounded-lg shadow-md transition duration-200">SIGN IN</button>
                <div class="flex flex-col gap-1 mt-2">
                    <p class="text-xs text-center -mt-4">Already have an account?<a href="login.html" class="text-[#8F0919] hover:underline ml-1">Login</a></p>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
