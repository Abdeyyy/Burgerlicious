    <!-- PROFIL SECTION -->
    <section class="pt-32 pb-16 min-h-screen flex items-start justify-center">
        <div class="bg-white p-8 md:p-12 rounded-[2rem] shadow-xl border border-gray-100 w-full max-w-2xl mx-4">
            <div class="flex flex-col items-center text-center">
                <div class="w-32 h-32 bg-gray-200 rounded-full flex items-center justify-center text-[#5D0303] text-5xl mb-6 shadow-inner">
                    <i class="fas fa-user-circle"></i>
                </div>
                <h1 id="profileName" class="text-3xl font-bold text-gray-800 mb-2">Memuat...</h1>
                <p id="profileEmail" class="text-gray-500 mb-8">Memuat...</p>

                <div class="w-full text-left bg-gray-50 p-6 rounded-2xl border border-gray-200 mb-8">
                    <h2 class="text-lg font-bold text-[#BA0000] mb-4 border-b border-gray-200 pb-2">Informasi Akun</h2>

                        <div class="flex justify-between">
                            <span class="text-gray-500 font-medium">Status</span>
                            <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">Terverifikasi</span>

                <div class="flex gap-4 w-full">

    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <script src="../frontend/js/session.js?v=4"></script>
    <script>
        // Mengisi data profil dari session check
        document.addEventListener('DOMContentLoaded', async function () {
            try {
                const res = await fetch('../../auth/check_session.php');
                const data = await res.json();
                if (data.loggedIn) {
                    document.getElementById('profileName').textContent = data.nama;
                    document.getElementById('profileEmail').textContent = data.email || 'Email tidak tersedia';
                } else {
                    window.location.href = 'login.html'; // redirect ke login jika belum login
                }
            } catch (error) {
                console.error(error);
            }
        });
    </script>
