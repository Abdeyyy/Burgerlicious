<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Order Monitor - Burgerlicious</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Be Vietnam Pro', sans-serif; background-color: #BA0000; }
        h1, h2, h3, h4 { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .number-card {
            animation: fadeInScale 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="text-white min-h-screen p-8 flex flex-col">
    <header class="flex justify-between items-center mb-12">
        <div class="flex items-center gap-6">
            <img src="../../assets/icon/Logo_Burgerlicious_square.png" class="w-20 h-20 rounded-full border-4 border-white/20 shadow-2xl" />
            <div>
                <h1 class="text-5xl font-black tracking-tighter text-[#FEBB19]">ORDER MONITOR</h1>
                <p class="text-white/70 font-bold uppercase tracking-[0.3em] text-xs mt-1">Freshly Grilled For You</p>
            </div>
        </div>
        <div class="text-right">
            <div id="clock" class="text-5xl font-black text-white/30 mb-1">00:00</div>
            <p id="date" class="text-[10px] font-bold text-white/20 uppercase tracking-widest"></p>
        </div>
    </header>

    <main class="grid grid-cols-1 md:grid-cols-2 gap-16 max-w-7xl mx-auto w-full flex-1">
        <!-- Preparing Section -->
        <section>
            <div class="flex items-center gap-4 mb-8 border-b-4 border-white/10 pb-6">
                <div class="w-14 h-14 bg-white/10 rounded-2xl flex items-center justify-center shadow-inner">
                    <span class="material-symbols-outlined text-4xl">cooking</span>
                </div>
                <h2 class="text-4xl font-black tracking-tight">PREPARING</h2>
            </div>
            <div id="preparing-list" class="grid grid-cols-2 sm:grid-cols-3 gap-6">
                <!-- Numbers will appear here -->
            </div>
        </section>

        <!-- Ready Section -->
        <section>
            <div class="flex items-center gap-4 mb-8 border-b-4 border-[#FEBB19]/30 pb-6">
                <div class="w-14 h-14 bg-[#FEBB19]/20 rounded-2xl flex items-center justify-center text-[#FEBB19] shadow-inner">
                    <span class="material-symbols-outlined text-4xl animate-bounce">notifications_active</span>
                </div>
                <h2 class="text-4xl font-black text-[#FEBB19] tracking-tight">READY TO PICKUP</h2>
            </div>
            <div id="ready-list" class="grid grid-cols-2 sm:grid-cols-3 gap-6">
                <!-- Numbers will appear here -->
            </div>
        </section>
    </main>

    <footer class="mt-12 text-center border-t border-white/5 pt-8">
        <p class="text-xs font-bold tracking-[0.5em] text-white/20 uppercase">Please wait for your order number to appear in the yellow section.</p>
    </footer>

    <!-- Sound for notification -->
    <audio id="ready-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        const preparingList = document.getElementById('preparing-list');
        const readyList = document.getElementById('ready-list');
        const clock = document.getElementById('clock');
        const dateEl = document.getElementById('date');
        const readySound = document.getElementById('ready-sound');

        let lastReadyCount = -1;

        const updateTime = () => {
            const now = new Date();
            clock.textContent = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            dateEl.textContent = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        };
        updateTime();
        setInterval(updateTime, 1000);

        const fetchMonitor = async () => {
            try {
                const res = await fetch('../../api/order/read_public.php');
                const data = await res.json();
                if (data.status === 'success') {
                    renderList(preparingList, data.data.preparing);
                    renderList(readyList, data.data.ready, true);

                    // Play sound if new order is ready
                    if (lastReadyCount !== -1 && data.data.ready.length > lastReadyCount) {
                        readySound.play().catch(e => console.log("Audio play blocked by browser"));
                    }
                    lastReadyCount = data.data.ready.length;
                }
            } catch (e) {
                console.error("Monitor error:", e);
            }
        };

        const renderList = (container, orders, isReady = false) => {
            if (orders.length === 0) {
                container.innerHTML = '<div class="col-span-full py-12 text-center opacity-10 text-3xl font-black italic tracking-widest">NONE</div>';
                return;
            }
            container.innerHTML = orders.map(num => `
                <div class="number-card ${isReady ? 'bg-[#FEBB19] text-[#BA0000] shadow-2xl shadow-[#FEBB19]/20 scale-105' : 'bg-white/10 text-white'} py-8 rounded-[2.5rem] text-6xl font-black text-center border-4 ${isReady ? 'border-white/40' : 'border-transparent'}">
                    #${num}
                </div>
            `).join('');
        };

        fetchMonitor();
        setInterval(fetchMonitor, 3000); // Fast refresh for monitor
    </script>
</body>
</html>
