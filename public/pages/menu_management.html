<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Menu Management - Burgerlicious Admin Panel</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="../frontend/js/tailwind-admin-config.js"></script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>

<body class="bg-surface text-on-surface">
    <!-- Sidebar Placeholder -->
    <div id="sidebar-container"></div>
    <!-- Main Content Canvas -->
    <main class="ml-64 p-8 min-h-screen">
        <!-- Header -->
        <header class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-3xl font-extrabold tracking-tight text-on-surface">Menu Management</h2>
                <p class="text-on-surface-variant font-medium">Add, edit, and manage your restaurant menu items.</p>
            </div>
            <button id="add-item-btn"
                class="bg-primary hover:bg-primary-dim text-on-primary px-6 py-3 rounded-full font-bold shadow-lg shadow-primary/20 transition-all active:scale-95 flex items-center gap-2">
                <span class="material-symbols-outlined" data-icon="add">add</span>
                Add New Item
            </button>
        </header>

        <!-- Filters & Search -->
        <section class="bg-surface-container-lowest p-6 rounded-lg shadow-sm border border-outline-variant/10 mb-8">
            <div class="flex gap-4 flex-wrap items-center">
                <div class="flex-1 min-w-[200px]">
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-3 top-2.5 text-on-surface-variant text-sm"
                            data-icon="search">search</span>
                        <input id="search-input"
                            class="w-full pl-9 pr-4 py-2 bg-surface-container border border-outline-variant rounded-lg text-sm focus:ring-1 focus:ring-primary focus:border-primary"
                            placeholder="Search menu items..." type="text" />
                    </div>
                </div>
                <select id="category-filter"
                    class="px-4 py-2 bg-surface-container border border-outline-variant rounded-lg text-sm focus:ring-1 focus:ring-primary">
                    <option value="all">All Categories</option>
                </select>
                <button
                    class="flex items-center gap-2 text-sm font-bold text-on-surface-variant px-4 py-2 bg-surface-container rounded-lg hover:bg-surface-container-high transition-colors">
                    <span class="material-symbols-outlined text-sm" data-icon="download">download</span>
                    Export
                </button>
            </div>
        </section>

        <!-- Menu Items Grid -->
        <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12" id="menu-items-container">
            <!-- Menu items will be loaded here dynamically -->
        </section>

    </main>

    <!-- Modal structure -->
    <div id="menu-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
        <div class="bg-surface-container-lowest w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
            <div class="px-6 py-4 border-b border-outline-variant/20 flex justify-between items-center text-on-surface">
                <h3 id="modal-title" class="text-xl font-bold">Add New Menu Item</h3>
                <button id="close-modal" class="p-2 hover:bg-surface-container rounded-full transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <form id="menu-form" class="p-6 space-y-4">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider">Item Name</label>
                    <input id="item-name" name="nama_menu" type="text" required class="w-full bg-surface-container border-none rounded-lg focus:ring-2 focus:ring-primary/20 text-on-surface">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider">Category</label>
                        <select id="item-category" name="id_kategori" required class="w-full bg-surface-container border-none rounded-lg focus:ring-2 focus:ring-primary/20 text-on-surface">
                            <!-- Categories dynamic -->
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider">Price (IDR)</label>
                        <input id="item-price" name="harga" type="number" required class="w-full bg-surface-container border-none rounded-lg focus:ring-2 focus:ring-primary/20 text-on-surface">
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider">Description</label>
                    <textarea id="item-description" name="deskripsi" rows="3" class="w-full bg-surface-container border-none rounded-lg focus:ring-2 focus:ring-primary/20 text-on-surface"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider">Image</label>
                        <input name="gambar" type="file" accept="image/*" class="w-full text-sm text-on-surface-variant file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-primary/10 file:text-primary hover:file:bg-primary/20">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider">Status</label>
                        <select id="item-status" name="status_tersedia" class="w-full bg-surface-container border-none rounded-lg focus:ring-2 focus:ring-primary/20 text-on-surface">
                            <option value="1">Available</option>
                            <option value="0">Out of Stock</option>
                        </select>
                    </div>
                </div>
                <div class="pt-4">
                    <button type="submit" class="w-full py-3 bg-primary text-on-primary rounded-full font-bold shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all">
                        Save Menu Item
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../frontend/js/session.js?v=17"></script>
    <script src="../frontend/js/admin_sidebar.js"></script>
    <script src="../frontend/js/menu_management.js?v=1.1"></script>
</body>

</html>
